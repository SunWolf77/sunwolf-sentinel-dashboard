name: Auto Deploy Check + Test

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: Test Streamlit build
        run: python -c "import streamlit as st; print('✅ Streamlit loads cleanly')"
      - name: Lint
        run: python -m pyright streamlit_app.py || echo "Warnings OK for dashboard"
