name: Auto Deploy SolWatch
on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - name: Test run
        run: python -c 'import streamlit; print("✅ Ready for Streamlit Cloud auto-deploy")'
      - name: Success
        run: echo "Auto deploy ready - connect repo to Streamlit Cloud for instant live updates on push"